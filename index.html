<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDBC基础到高级 - 尚硅谷</title>
<style>
:root {
  --sidebar-width: 320px;
  --primary: #1a73e8;
  --primary-dark: #1557b0;
  --bg: #ffffff;
  --sidebar-bg: #f8f9fa;
  --text: #333;
  --text-light: #666;
  --border: #e0e0e0;
  --heading-color: #1a1a1a;
  --code-bg: #f5f5f5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  color: var(--text);
  line-height: 1.7;
  background: var(--bg);
}

/* Sidebar */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: var(--sidebar-width);
  height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 100;
  transition: transform 0.3s ease;
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  background: var(--primary);
  color: white;
}

.sidebar-header h2 {
  font-size: 16px;
  font-weight: 600;
}

.sidebar-header p {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 4px;
}

.search-box {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.search-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.search-tab {
  flex: 1;
  padding: 6px 0;
  font-size: 13px;
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-light);
}

.search-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.search-box input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  outline: none;
}

.search-box input:focus {
  border-color: var(--primary);
}

.search-status {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 6px;
  min-height: 18px;
}

/* Hierarchical TOC */
.toc {
  padding: 10px 0;
}

.toc > ul {
  list-style: none;
}

.toc-section {
  margin-bottom: 2px;
}

.toc-section-header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  cursor: pointer;
  user-select: none;
  font-size: 14px;
  font-weight: 600;
  color: var(--heading-color);
  background: rgba(0,0,0,0.02);
  border-left: 3px solid transparent;
  transition: all 0.2s;
}

.toc-section-header:hover {
  background: rgba(26, 115, 232, 0.06);
}

.toc-arrow {
  display: inline-block;
  margin-right: 6px;
  font-size: 11px;
  transition: transform 0.2s ease;
  color: var(--text-light);
  flex-shrink: 0;
}

.toc-section.expanded > .toc-section-header .toc-arrow {
  transform: rotate(90deg);
}

.toc-section-title {
  flex: 1;
}

.toc-children {
  list-style: none;
  display: none;
  padding: 0;
}

.toc-section.expanded > .toc-children {
  display: block;
}

.toc-children a {
  display: block;
  padding: 6px 16px 6px 36px;
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  border-left: 3px solid transparent;
  transition: all 0.2s;
}

.toc-children a:hover {
  background: rgba(26, 115, 232, 0.08);
  color: var(--primary);
}

.toc-children a.active {
  color: var(--primary);
  border-left-color: var(--primary);
  background: rgba(26, 115, 232, 0.08);
  font-weight: 500;
}

.search-results {
  padding: 8px 0;
}

.search-results ul {
  list-style: none;
}

.search-result {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.2s;
}

.search-result:hover {
  background: rgba(26, 115, 232, 0.06);
}

.search-result-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--primary);
  margin-bottom: 4px;
}

.search-result-snippet {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.search-result-snippet mark {
  background: #ffeb3b;
  color: #000;
  padding: 0 2px;
  border-radius: 2px;
}

.search-empty {
  padding: 20px;
  text-align: center;
  color: var(--text-light);
  font-size: 13px;
}

/* Main content */
.main {
  margin-left: var(--sidebar-width);
  padding: 40px 60px;
  max-width: 1000px;
  min-height: 100vh;
}

.chapter {
  margin-bottom: 60px;
  padding-bottom: 40px;
  border-bottom: 1px solid var(--border);
}

.chapter:last-child {
  border-bottom: none;
}

.chapter h1 {
  font-size: 28px;
  color: var(--heading-color);
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--primary);
}

.chapter-content {
  font-size: 15px;
  line-height: 1.8;
}

.chapter-content h2 {
  font-size: 22px;
  margin-top: 32px;
  margin-bottom: 16px;
  color: var(--heading-color);
}

.chapter-content h3 {
  font-size: 18px;
  margin-top: 24px;
  margin-bottom: 12px;
  color: var(--heading-color);
}

.chapter-content h4, .chapter-content h5 {
  font-size: 16px;
  margin-top: 20px;
  margin-bottom: 10px;
  color: var(--heading-color);
}

.chapter-content p {
  margin-bottom: 16px;
}

.chapter-content ul, .chapter-content ol {
  margin-bottom: 16px;
  padding-left: 24px;
}

.chapter-content li {
  margin-bottom: 8px;
}

.chapter-content blockquote {
  margin: 16px 0;
  padding: 12px 20px;
  background: #f8f9fa;
  border-left: 4px solid var(--primary);
  color: var(--text-light);
}

.chapter-content blockquote p {
  margin-bottom: 8px;
}

.chapter-content blockquote p:last-child {
  margin-bottom: 0;
}

.chapter-content pre {
  margin: 16px 0;
  padding: 16px;
  background: var(--code-bg);
  border-radius: 6px;
  overflow-x: auto;
  font-size: 14px;
  line-height: 1.6;
}

.chapter-content code {
  font-family: "SF Mono", Monaco, Consolas, "Liberation Mono", monospace;
  font-size: 14px;
}

.chapter-content p code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 13px;
}

.chapter-content table {
  width: 100%;
  margin: 16px 0;
  border-collapse: collapse;
}

.chapter-content th, .chapter-content td {
  padding: 10px 12px;
  border: 1px solid var(--border);
  text-align: left;
}

.chapter-content th {
  background: var(--code-bg);
  font-weight: 600;
}

.chapter-content img {
  max-width: 100%;
  height: auto;
  border-radius: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  margin: 16px 0;
}

.loading, .error {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-light);
  font-size: 16px;
}

.error {
  color: #c5221f;
}

/* Mobile */
.menu-toggle {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 200;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 18px;
  cursor: pointer;
}

@media (max-width: 768px) {
  :root { --sidebar-width: 280px; }
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .main {
    margin-left: 0;
    padding: 20px;
  }
  .menu-toggle {
    display: block;
  }
}

/* Scrollbar */
.sidebar::-webkit-scrollbar {
  width: 6px;
}
.sidebar::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 3px;
}

<script>
const contentEl = document.getElementById('content');
const tocLinks = document.querySelectorAll('.toc-children a');
const searchInput = document.getElementById('searchInput');
const searchStatus = document.getElementById('searchStatus');
const tocPanel = document.getElementById('tocPanel');
const searchResultsPanel = document.getElementById('searchResultsPanel');
const searchResultsList = document.getElementById('searchResultsList');
const searchTabs = document.querySelectorAll('.search-tab');

let searchMode = 'toc';
let searchIndex = null;
let searchIndexLoading = false;
let searchDebounceTimer = null;

function toggleSection(headerEl) {
  const section = headerEl.parentElement;
  section.classList.toggle('expanded');
}

function setSearchMode(mode) {
  searchMode = mode;
  searchTabs.forEach(tab => tab.classList.toggle('active', tab.dataset.mode === mode));
  searchInput.placeholder = mode === 'toc' ? '搜索章节...' : '搜索全文内容...';
  searchStatus.textContent = '';

  if (mode === 'toc') {
    tocPanel.style.display = '';
    searchResultsPanel.style.display = 'none';
    filterTOC(searchInput.value);
  } else {
    tocPanel.style.display = 'none';
    searchResultsPanel.style.display = '';
    onSearchInput(searchInput.value);
  }
}

function filterTOC(query) {
  const q = query.toLowerCase().trim();
  const sections = document.querySelectorAll('#tocList > li.toc-section');
  sections.forEach(section => {
    const children = section.querySelectorAll('.toc-children li');
    const sectionTitle = section.querySelector('.toc-section-title').textContent.toLowerCase();
    let anyChildMatch = false;
    children.forEach(li => {
      const text = li.textContent.toLowerCase();
      const match = text.includes(q);
      li.style.display = match ? '' : 'none';
      if (match) anyChildMatch = true;
    });
    const sectionMatch = sectionTitle.includes(q);
    if (sectionMatch || anyChildMatch || !q) {
      section.style.display = '';
      if (q && (sectionMatch || anyChildMatch)) {
        section.classList.add('expanded');
      }
    } else {
      section.style.display = 'none';
    }
  });
}

async function loadSearchIndex() {
  if (searchIndex) return searchIndex;
  if (searchIndexLoading) return null;
  searchIndexLoading = true;
  searchStatus.textContent = '正在加载搜索索引...';
  try {
    const resp = await fetch('assets/search-index.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const blob = await resp.blob();
    const searchIndexSize = blob.size;
    searchIndex = JSON.parse(await blob.text());
    searchStatus.textContent = '索引加载完成，共 ' + searchIndex.entries.length + ' 章（约 ' + Math.round(searchIndexSize / 1024) + ' KB）';
    return searchIndex;
  } catch (err) {
    searchStatus.textContent = '索引加载失败：' + err.message;
    return null;
  } finally {
    searchIndexLoading = false;
  }
}

function highlightTerms(text, terms) {
  let result = text;
  for (const term of terms) {
    const re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  }
  return result;
}

function buildSnippet(text, terms) {
  const lower = text.toLowerCase();
  let pos = -1;
  for (const term of terms) {
    const idx = lower.indexOf(term);
    if (idx !== -1 && (pos === -1 || idx < pos)) pos = idx;
  }
  if (pos === -1) pos = 0;
  const start = Math.max(0, pos - 40);
  const end = Math.min(text.length, pos + 140);
  let snippet = text.slice(start, end);
  if (start > 0) snippet = '…' + snippet;
  if (end < text.length) snippet = snippet + '…';
  return highlightTerms(snippet, terms);
}

function renderSearchResults(query) {
  const q = query.trim().toLowerCase();
  if (!q) {
    searchResultsList.innerHTML = '<li class="search-empty">输入关键词搜索全书内容</li>';
    searchStatus.textContent = '';
    return;
  }
  const terms = q.split(/\s+/).filter(Boolean);
  const results = [];
  const titles = searchIndex.titles || {};
  for (const entry of searchIndex.entries) {
    const text = entry[1].toLowerCase();
    if (terms.every(t => text.includes(t))) {
      results.push({
        chapter: entry[0],
        title: titles[entry[0]] || ('章节 ' + entry[0]),
        snippet: buildSnippet(entry[1], terms)
      });
    }
  }

  if (results.length === 0) {
    searchResultsList.innerHTML = '<li class="search-empty">未找到匹配内容</li>';
    searchStatus.textContent = '0 条结果';
    return;
  }

  const top = results.slice(0, 50);
  searchResultsList.innerHTML = '';
  for (const r of top) {
    const li = document.createElement('li');
    li.className = 'search-result';
    li.onclick = () => onSearchResultClick(r.chapter);

    const titleDiv = document.createElement('div');
    titleDiv.className = 'search-result-title';
    titleDiv.textContent = r.title;

    const snippetDiv = document.createElement('div');
    snippetDiv.className = 'search-result-snippet';
    snippetDiv.innerHTML = r.snippet;

    li.appendChild(titleDiv);
    li.appendChild(snippetDiv);
    searchResultsList.appendChild(li);
  }
  searchStatus.textContent = top.length + (results.length > top.length ? ' / ' + results.length : '') + ' 条结果';
}

async function onSearchInput(value) {
  if (searchMode === 'toc') {
    filterTOC(value);
    return;
  }
  if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
  if (!value.trim()) {
    renderSearchResults('');
    return;
  }
  searchDebounceTimer = setTimeout(async () => {
    if (!searchIndex) {
      const loaded = await loadSearchIndex();
      if (!loaded) return;
    }
    renderSearchResults(value);
  }, 250);
}

async function onSearchResultClick(chapterNum) {
  await loadChapter(chapterNum);
  document.querySelector('.sidebar').classList.remove('open');
}

function setActiveChapter(num) {
  tocLinks.forEach(link => {
    link.classList.toggle('active', link.dataset.chapter === String(num));
  });
  // Auto-expand parent section
  const activeLink = document.querySelector('.toc-children a.active');
  if (activeLink) {
    const parentSection = activeLink.closest('.toc-section');
    if (parentSection) parentSection.classList.add('expanded');
  }
}

function chapterUrl(num) {
  return 'chapters/chapter-' + num + '.html';
}

function getInitialChapterNum() {
  const match = location.hash.match(/^#chapter-(\d+)$/);
  if (match) return parseInt(match[1], 10);
  const first = document.querySelector('.toc-children a');
  return first ? parseInt(first.dataset.chapter, 10) : null;
}

async function loadChapter(num) {
  if (!num) return;
  contentEl.innerHTML = '<div class="loading">正在加载章节内容...</div>';
  try {
    const response = await fetch(chapterUrl(num));
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const html = await response.text();
    contentEl.innerHTML = html;
    setActiveChapter(num);
    const heading = contentEl.querySelector('.chapter h1');
    document.title = heading ? (heading.textContent + ' - JDBC基础到高级') : 'JDBC基础到高级 - 尚硅谷';
    if (location.hash !== '#chapter-' + num) {
      history.replaceState(null, null, '#chapter-' + num);
    }
  } catch (err) {
    contentEl.innerHTML = '<div class="error">章节加载失败：' + err.message + '</div>';
  }
}

tocLinks.forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    const num = parseInt(link.dataset.chapter, 10);
    loadChapter(num);
    document.querySelector('.sidebar').classList.remove('open');
  });
});

window.addEventListener('hashchange', () => {
  const num = getInitialChapterNum();
  if (num) loadChapter(num);
});

// Expand first section by default
const firstSection = document.querySelector('.toc-section');
if (firstSection) firstSection.classList.add('expanded');

// Load initial chapter
loadChapter(getInitialChapterNum());
</script>

</body>
</html>
